<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Client Portal - Skyview Aerial Media</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .portal-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 3rem;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo svg {
            width: 60px;
            height: 60px;
            stroke: #00d4ff;
            margin-bottom: 1rem;
        }

        .logo h1 {
            color: white;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
        }

        .logo p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.875rem;
        }

        .login-form {
            margin-top: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group input {
            width: 100%;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #00d4ff;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .form-group input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .login-button {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #00d4ff, #0066ff);
            border: none;
            border-radius: 50px;
            color: white;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
        }

        .login-button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.4);
        }

        .login-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .login-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .login-button:hover:not(:disabled)::before {
            left: 100%;
        }

        .error-message {
            background: rgba(255, 59, 48, 0.1);
            border: 1px solid rgba(255, 59, 48, 0.3);
            border-radius: 10px;
            padding: 1rem;
            color: #ff6b6b;
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
            display: none;
        }

        .error-message.show {
            display: block;
            animation: shake 0.5s ease;
        }

        .warning-message {
            background: rgba(255, 180, 0, 0.1);
            border: 1px solid rgba(255, 180, 0, 0.3);
            border-radius: 10px;
            padding: 0.75rem 1rem;
            color: #ffd166;
            font-size: 0.8125rem;
            margin-bottom: 1.5rem;
            display: none;
        }

        .warning-message.show {
            display: block;
        }

        .attempt-counter {
            text-align: right;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.4);
            margin-top: -1rem;
            margin-bottom: 1rem;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .help-text {
            text-align: center;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .help-text p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.875rem;
            margin-bottom: 1rem;
        }

        .help-text a {
            color: #00d4ff;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .help-text a:hover {
            color: #00ffff;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 2rem;
        }

        .loading.show {
            display: block;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.875rem;
        }

        @media (max-width: 768px) {
            .portal-container {
                padding: 2rem 1.5rem;
            }

            .logo h1 {
                font-size: 1.25rem;
            }
        }
    </style>
</head>

<body>
    <div class="portal-container">
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="10" y="10" width="4" height="3" rx="0.5" stroke="currentColor" stroke-width="1.5" fill="currentColor" />
                <circle cx="12" cy="13.5" r="1" fill="#1A1A1A" />
                <line x1="10" y1="11" x2="4" y2="5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
                <line x1="14" y1="11" x2="20" y2="5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
                <line x1="10" y1="12" x2="4" y2="18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
                <line x1="14" y1="12" x2="20" y2="18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
                <circle cx="4" cy="5" r="2" stroke="currentColor" stroke-width="1.5" />
                <circle cx="20" cy="5" r="2" stroke="currentColor" stroke-width="1.5" />
                <circle cx="4" cy="18" r="2" stroke="currentColor" stroke-width="1.5" />
                <circle cx="20" cy="18" r="2" stroke="currentColor" stroke-width="1.5" />
            </svg>
            <h1>CLIENT PORTAL</h1>
            <p>Skyview Aerial Media</p>
        </div>

        <div id="loginView" class="login-form">
            <div id="warningMessage" class="warning-message"></div>
            <div id="errorMessage" class="error-message"></div>

            <form id="loginForm" autocomplete="off">
                <div class="form-group">
                    <label for="accessCode">Access Code</label>
                    <input
                        type="password"
                        id="accessCode"
                        name="accessCode"
                        placeholder="Enter your access code"
                        required
                        autocomplete="off"
                        spellcheck="false"
                    >
                </div>

                <div id="attemptCounter" class="attempt-counter" aria-live="polite"></div>

                <button type="submit" id="submitBtn" class="login-button">
                    Access Your Files
                </button>
            </form>

            <div class="help-text">
                <p>Don't have an access code?</p>
                <p>
                    <a href="/#contact">Contact us</a> or check your email for your unique portal link.
                </p>
            </div>
        </div>

        <div id="loadingView" class="loading">
            <div class="loading-spinner"></div>
            <p>Verifying access...</p>
        </div>
    </div>

    <script>
        (function () {
            'use strict';

            var RATE_LIMIT_KEY = 'skyview:portal-attempts:v1';
            var MAX_ATTEMPTS = 5;
            var LOCKOUT_MS = 15 * 60 * 1000;

            var form = document.getElementById('loginForm');
            var errorMessage = document.getElementById('errorMessage');
            var warningMessage = document.getElementById('warningMessage');
            var loginView = document.getElementById('loginView');
            var loadingView = document.getElementById('loadingView');
            var submitBtn = document.getElementById('submitBtn');
            var attemptCounter = document.getElementById('attemptCounter');

            function getAttemptState() {
                try {
                    var raw = localStorage.getItem(RATE_LIMIT_KEY);
                    if (!raw) return { count: 0, lockedUntil: null };
                    return JSON.parse(raw);
                } catch (e) {
                    return { count: 0, lockedUntil: null };
                }
            }

            function saveAttemptState(state) {
                try {
                    localStorage.setItem(RATE_LIMIT_KEY, JSON.stringify(state));
                } catch (e) { }
            }

            function recordFailedAttempt() {
                var state = getAttemptState();
                state.count = (state.count || 0) + 1;
                if (state.count >= MAX_ATTEMPTS) {
                    state.lockedUntil = Date.now() + LOCKOUT_MS;
                }
                saveAttemptState(state);
                return state;
            }

            function clearAttempts() {
                try { localStorage.removeItem(RATE_LIMIT_KEY); } catch (e) { }
            }

            function isLockedOut() {
                var state = getAttemptState();
                if (!state.lockedUntil) return false;
                if (Date.now() < state.lockedUntil) return true;
                clearAttempts();
                return false;
            }

            function getLockoutMinutesRemaining() {
                var state = getAttemptState();
                if (!state.lockedUntil) return 0;
                return Math.ceil((state.lockedUntil - Date.now()) / 60000);
            }

            function updateAttemptUI() {
                var state = getAttemptState();
                var remaining = MAX_ATTEMPTS - (state.count || 0);
                if (state.count > 0 && remaining > 0 && remaining < MAX_ATTEMPTS) {
                    attemptCounter.textContent = remaining + ' attempt' + (remaining === 1 ? '' : 's') + ' remaining';
                } else {
                    attemptCounter.textContent = '';
                }
            }

            // Token expiry: format clientId.expiry_unix_seconds.signature
            function parseTokenExpiry(code) {
                var parts = code.split('.');
                if (parts.length < 2) return null;
                var expiry = parseInt(parts[1], 10);
                return isFinite(expiry) ? expiry : null;
            }

            function isTokenExpired(code) {
                var expiry = parseTokenExpiry(code);
                if (!expiry) return false;
                return Math.floor(Date.now() / 1000) > expiry;
            }

            function showError(message) {
                errorMessage.textContent = message;
                errorMessage.classList.add('show');
                setTimeout(function () { errorMessage.classList.remove('show'); }, 7000);
            }

            function showWarning(message) {
                warningMessage.textContent = message;
                warningMessage.classList.add('show');
            }

            function setLocked(locked) {
                submitBtn.disabled = locked;
                document.getElementById('accessCode').disabled = locked;
                submitBtn.textContent = locked ? 'Too many attempts' : 'Access Your Files';
            }

            function checkInitialLockout() {
                if (isLockedOut()) {
                    var mins = getLockoutMinutesRemaining();
                    showWarning('Too many failed attempts. Please wait ' + mins + ' minute' + (mins === 1 ? '' : 's') + ' before trying again.');
                    setLocked(true);

                    var timer = setInterval(function () {
                        if (!isLockedOut()) {
                            clearInterval(timer);
                            setLocked(false);
                            warningMessage.classList.remove('show');
                            clearAttempts();
                            updateAttemptUI();
                        } else {
                            var m = getLockoutMinutesRemaining();
                            showWarning('Too many failed attempts. Please wait ' + m + ' minute' + (m === 1 ? '' : 's') + ' before trying again.');
                        }
                    }, 30000);
                }
                updateAttemptUI();
            }

            form.addEventListener('submit', function (e) {
                e.preventDefault();

                if (isLockedOut()) {
                    var mins = getLockoutMinutesRemaining();
                    showError('Account locked. Please wait ' + mins + ' minute' + (mins === 1 ? '' : 's') + '.');
                    return;
                }

                var accessCode = document.getElementById('accessCode').value.trim();

                if (!accessCode) {
                    showError('Please enter your access code.');
                    return;
                }

                loginView.style.display = 'none';
                loadingView.classList.add('show');

                setTimeout(function () {
                    if (isTokenExpired(accessCode)) {
                        loadingView.classList.remove('show');
                        loginView.style.display = 'block';
                        showError('This access link has expired. Please contact us to request a new one.');
                        recordFailedAttempt();
                        updateAttemptUI();
                        return;
                    }

                    if (accessCode.length >= 8) {
                        clearAttempts();
                        window.location.href = '/client-gallery.html?code=' + encodeURIComponent(accessCode);
                    } else {
                        var state = recordFailedAttempt();
                        loadingView.classList.remove('show');
                        loginView.style.display = 'block';
                        updateAttemptUI();

                        if (isLockedOut()) {
                            setLocked(true);
                            var lockMins = getLockoutMinutesRemaining();
                            showError('Too many failed attempts. Please wait ' + lockMins + ' minute' + (lockMins === 1 ? '' : 's') + ' before trying again.');
                            showWarning('Account temporarily locked after ' + MAX_ATTEMPTS + ' failed attempts.');
                        } else {
                            var remaining = MAX_ATTEMPTS - state.count;
                            showError('Invalid access code. Please check your email or contact us for help.' +
                                (remaining > 0 ? ' (' + remaining + ' attempt' + (remaining === 1 ? '' : 's') + ' remaining)' : ''));
                        }
                    }
                }, 800 + Math.floor(Math.random() * 400));
            });

            // Auto-fill from URL param (email link flow)
            var urlParams = new URLSearchParams(window.location.search);
            var codeFromUrl = urlParams.get('code');
            if (codeFromUrl) {
                document.getElementById('accessCode').value = codeFromUrl;
                if (isTokenExpired(codeFromUrl)) {
                    showError('This access link has expired. Please contact us to request a new one.');
                } else {
                    form.dispatchEvent(new Event('submit'));
                }
            }

            checkInitialLockout();
        })();
    </script>
</body>

</html>
