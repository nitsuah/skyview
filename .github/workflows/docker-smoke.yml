name: Docker Smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  docker-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Build image
        run: docker build -t skyview-docker-smoke .

      - name: Start container
        run: docker run -d --name skyview-smoke -p 8080:80 skyview-docker-smoke

      - name: Wait for app
        run: |
          for i in {1..20}; do
            if curl -fsS http://127.0.0.1:8080 >/dev/null; then
              echo "App responded on attempt $i"
              exit 0
            fi
            sleep 2
          done
          echo "Skyview did not respond within timeout"
          docker logs skyview-smoke
          exit 1

      - name: Stop container
        if: always()
        run: docker rm -f skyview-smoke